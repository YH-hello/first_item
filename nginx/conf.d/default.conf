server {
    listen 80;

    # 1. 배포된 웹페이지 (http://localhost)
    location / {
        root /usr/share/nginx/html/deploy_to_nginx;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # 2. 젠킨스 관리 화면 (http://localhost/jenkins)
    # 이 설정을 쓰려면 젠킨스 설정에서도 --prefix=/jenkins 추가가 필요할 수 있습니다.
    # 일단 웹페이지 확인이 우선이라면 아래 섹션은 주석 처리해도 됩니다.
    location /jenkins/ {
        proxy_pass http://jenkins-server:8080/jenkins/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}