version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins-server
    restart: always
    ports:
      - "9090:8080"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - ci-cd-net

  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      # Jenkins 데이터를 Nginx 웹 경로와 공유
      - jenkins_home:/usr/share/nginx/html
    networks:
      - ci-cd-net

  neo4j:
    image: neo4j:5.20
    container_name: neo4j-db
    restart: always
    ports:
      - "7474:7474"   # Neo4j Browser (웹 UI)
      - "7687:7687"   # Bolt 프로토콜 (애플리케이션 연결)
    environment:
      - NEO4J_AUTH=neo4j/morning1   # 기본 계정/비밀번호 (neo4j / morning1)
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - ci-cd-net

networks:
  ci-cd-net:
    driver: bridge

volumes:
  jenkins_home:
  neo4j_data:
  neo4j_logs:
